{% extends 'base.html' %}

{% block content %}
<div class="container-fluid px-4 px-lg-5">
    <div class="row">

        <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar border-end vh-100 p-3">
            <div class="position-sticky">
                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-primary" href="#">
                            <i class="fa-solid fa-house me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <i class="fa-solid fa-briefcase me-2"></i> Job Openings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#">
                            <i class="fa-solid fa-file-invoice me-2"></i> My Applications
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-4">
            {% block dash_content %}{% endblock %}
        </main>

    </div>
</div>
{% endblock %}
