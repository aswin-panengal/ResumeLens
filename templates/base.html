<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeLens AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 700;
            color: #0f172a !important;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-light bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fa-solid fa-layer-group text-primary me-2"></i>ResumeLens
            </a>

            <div>
                {% if user.is_authenticated %}
                <span class="text-muted fw-semibold me-3 d-none d-md-inline">Hello, {{ user.first_name }}</span>
                <a href="{% url 'dashboard' %}" class="btn btn-outline-primary btn-sm me-2">Dashboard</a>

                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Log Out</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-dark btn-sm me-2">Log In</a>
                <a href="{% url 'signup' %}" class="btn btn-primary btn-sm">Get Started</a>
                {% endif %}
            </div>

        </div>
    </nav>
    <div class="container mt-3">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm"
            role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
    </div>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
