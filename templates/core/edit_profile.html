{% extends 'dashboard_base.html' %}

{% block sidebar_menu %}
<a href="{% url 'student_dashboard' %}" class="nav-link text-dark fw-bold">
    <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
</a>
{% endblock %}

{% block header %}
<div class="d-flex align-items-center">
    <div>
        <h4 class="fw-bold mb-0">Edit Profile</h4>
        <p class="text-muted small mb-0">Update your personal and academic details</p>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4 mt-3 bg-white">
            <div class="card-body p-5">
                <form method="POST">
                    {% csrf_token %}

                    <h6 class="fw-bold text-primary mb-3">Basic Information</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">First Name</label>
                            <input type="text" name="first_name" class="form-control bg-light"
                                value="{{ user.first_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Last Name</label>
                            <input type="text" name="last_name" class="form-control bg-light"
                                value="{{ user.last_name }}" required>
                        </div>
                    </div>

                    <h6 class="fw-bold text-primary mb-3">Academic Details</h6>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Branch / Degree</label>
                            <input type="text" name="branch" class="form-control bg-light"
                                value="{{ student.branch|default:'' }}" placeholder="e.g., MCA">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold">Graduation Year</label>
                            <input type="text" name="graduation_year" class="form-control bg-light"
                                value="{{ student.graduation_year|default:'' }}" placeholder="e.g., 2026">
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-end gap-2 mt-2">
                        <a href="{% url 'student_dashboard' %}" class="btn btn-light border px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 fw-bold">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
